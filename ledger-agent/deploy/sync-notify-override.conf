# Drop-in for the existing SimpleFIN sync service. Install with:
#   sudo mkdir -p /etc/systemd/system/<your-sync-service>.service.d
#   sudo cp sync-notify-override.conf /etc/systemd/system/<your-sync-service>.service.d/override.conf
#   sudo systemctl daemon-reload
# Runs the alert digest after every successful sync.
[Service]
Environment=LEDGER_DB=/home/pi/financeapp/finance.db
Environment=NTFY_TOPIC=CHANGE-ME-ledger-alerts-x7q2
ExecStartPost=/usr/bin/python3 /home/pi/ledger-agent/notify.py
